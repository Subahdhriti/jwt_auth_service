server:
  port: 8080

spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:admin}

    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 2000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


jwt:
  secret: ${JWT_SECRET:my-super-secure-secret-key-123456789012345}
  expiration: ${JWT_EXPIRATION:1800000}
  refreshExpirationDays: ${REFRESH_EXPIRATION:7}